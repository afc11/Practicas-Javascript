<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
</head>

<body>

    <h1>Pokemon</h1>

    <form id="form">
        <input type="text" id="input" placeholder="Escribí un pokemon..." />
        <button type="submit">Buscar</button>
    </form>

    <img id="sprite" width="150" height="150" />

    <div>
        <h2 id="nombre"></h2>
        <ul id="abilities"></ul>
    </div>

    <h1> </h1>

    <h2>Lista de Pokemons</h2>
    <button id="btnLista">Obtener Pokemons</button>
    <p id="loading" style="display:none">Cargando...</p>
    <ul id="lista"></ul>

    <h2>Manejo de errores</h2>
    <button id="btnError">Cargar datos</button>
    <p id="error" style="display:none; color:red"></p>

    <h2>Encadenamiento</h2>
    <input type="text" id="inputEncadenado" placeholder="Escribí un pokemon..." />
    <button id="btnEncadenado">Buscar habilidad</button>
    <div id="resultadoHabilidad"></div>

    <script src="Scrip.js"></script>

</body>

</html>
